name: Tests automatisés du modèle

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

jobs:
  test-model:
    name: Tester le cycle du modèle
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v7

      - name: Installer uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.29"
          enable-cache: true

      - name: Installer Python 3.12
        run: uv python install 3.12

      - name: Installer les dépendances
        run: uv sync --locked --dev

      - name: Exécuter les tests automatisés du modèle
        run: uv run pytest tests/test_cycle_model.py -v

      - name: Mesurer la couverture des tests
        run: |
          uv run pytest tests/test_cycle_model.py \
            --cov=src.preprocessing \
            --cov=src.pipeline \
            --cov-report=term-missing \
            --cov-report=html

      - name: Enregistrer le rapport de couverture
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapport-couverture-modele
          path: htmlcov/
          if-no-files-found: ignore