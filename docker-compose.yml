services:
  postgres:
    image: postgres:16-alpine
    container_name: water_lab_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.1.0
    container_name: water_lab_mlflow
    restart: unless-stopped

    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - sqlite:////mlflow/mlflow.db
      - --artifacts-destination
      - /mlflow/artifacts

    ports:
      - "5000:5000"

    volumes:
      - mlflow_data:/mlflow

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: water_lab_api
    restart: unless-stopped
    command:
      [
        "uvicorn",
        "src.api:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000"
      ]
    environment:
      API_AUTH_TOKEN: ${API_AUTH_TOKEN}
      OCR_SPACE_API_KEY: ${OCR_SPACE_API_KEY}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      DATABASE_URL: ${DATABASE_URL}
      LAB_USERNAME: ${LAB_USERNAME}
      LAB_PASSWORD: ${LAB_PASSWORD}
      USER_SESSION_DURATION_HOURS: ${USER_SESSION_DURATION_HOURS}
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: water_lab_streamlit
    restart: unless-stopped
    command:
      [
        "streamlit",
        "run",
        "front/app.py",
        "--server.address=0.0.0.0",
        "--server.port=8501"
      ]
    environment:
      API_URL: http://api:8000
      API_AUTH_TOKEN: ${API_AUTH_TOKEN}
    ports:
      - "8501:8501"
    depends_on:
      - api

  prometheus:
    image: prom/prometheus
    container_name: water_lab_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus_token.txt:/etc/prometheus/api_token:ro
      - prometheus_data:/prometheus
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    container_name: water_lab_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: "smtp.gmail.com:587"
      GF_SMTP_USER: "${GRAFANA_SMTP_USER}"
      GF_SMTP_PASSWORD: "${GRAFANA_SMTP_PASSWORD}"
      GF_SMTP_FROM_ADDRESS: "${GRAFANA_SMTP_USER}"
      GF_SMTP_FROM_NAME: "Water Lab Monitoring"
      GF_SMTP_SKIP_VERIFY: "false"
      GF_SMTP_STARTTLS_POLICY: "MandatoryStartTLS"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  mlflow_data:
  prometheus_data:
  grafana_data: